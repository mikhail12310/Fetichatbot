<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Chatbot - Intelligent Data Querying</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="gradient-text">SQLChat</span> AI
            </div>
            <div class="actions">
                <label for="file-upload" class="upload-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Add Data
                </label>
                <input type="file" id="file-upload" hidden accept=".csv,.xlsx,.xls,.parquet">
            </div>
        </header>

        <main id="chat-container">
            <div id="landing-options" class="landing-overlay">
                <h1>How would you like to start?</h1>
                <p>Choose an option to initialize your SQL Chatbot.</p>
                <div class="option-cards">
                    <div class="option-card" id="btn-upload-init">
                        <div class="icon">📁</div>
                        <h3>Upload My Data</h3>
                        <p>Upload CSV, Excel, or Parquet files to query.</p>
                    </div>
                    <div class="option-card" id="btn-example-init">
                        <div class="icon">📊</div>
                        <h3>Use Example Data</h3>
                        <p>Load sample datasets from the server.</p>
                    </div>
                </div>
            </div>
            <div id="suggestions-container" class="suggestions-container hidden">
                <!-- Suggestions will be injected here -->
            </div>
        </main>

        <footer>
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Ask a question about your data..." autocomplete="off">
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
